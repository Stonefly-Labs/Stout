# Stout CI
#
# INTERIM: all legs run on self-hosted runners while the maintainer operates
# them. The macOS legs (swift build/test + swift-format lint) and the
# iOS-Simulator build leg run on the self-hosted macOS runner; the Linux leg runs
# on the repo-scoped `Linux`/`docker` runner (a Docker-host runner) inside the
# official `swift:6.2` container via the job-level `container:` key, which pins the
# toolchain. The runner must be repo-scoped: Stout is a public repo, and org-level
# runner groups block public repositories by default, so an org runner's jobs sit
# queued forever.
#
# WHY macOS-alone is insufficient (design D6/D7): Stout is a cross-platform
# exporter for opentelemetry-swift that runs on iOS, macOS, watchOS, tvOS and
# Linux. Platform-specific transport (URLSession on Apple vs async-http-client
# on Linux) and Foundation differences are real, so CI MUST cover the
# iOS Simulator AND Linux — not just macOS. The Linux leg is the first real
# compile of `AsyncHTTPClientTransport` and the `CZlib` system-zlib shim.
#
# See docs/speckit/00-foundation-setup.md §4.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & Test (macOS)
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4
      - name: swift build
        run: swift build
      - name: swift test
        run: swift test

  linux:
    name: Build & Test (Linux)
    # Route by the `Linux` label to the repo-scoped Docker-host runner. The runner
    # provides Docker, so GitHub runs this job inside the container below and mounts
    # the checkout for us — no manual `docker run`/volume juggling.
    runs-on: [Linux]
    # swift:6.2+ is required — transitive deps (async-http-client, swift-log)
    # declare swift-tools 6.2, which the 6.0 image can't resolve.
    container: swift:6.2
    steps:
      - uses: actions/checkout@v4
      # zlib headers for the CZlib systemLibrary target (pkgConfig: "zlib").
      - name: Install zlib
        run: apt-get update && apt-get install -y --no-install-recommends zlib1g-dev
      - name: swift build
        run: swift build
      - name: swift test
        run: swift test

  ios-simulator:
    name: Build (iOS Simulator)
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4
      # Generic destination — builds for the simulator without booting one.
      - name: xcodebuild (iOS Simulator)
        run: >
          xcodebuild build
          -scheme Stout
          -destination 'generic/platform=iOS Simulator'

  lint:
    name: Lint (swift-format)
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4
      - name: swift format lint
        run: swift format lint --strict --recursive Sources Tests
