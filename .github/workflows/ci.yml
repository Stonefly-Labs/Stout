# Stout CI
#
# INTERIM: all legs run on self-hosted runners while the maintainer operates
# them. The macOS legs (swift build/test + swift-format lint) and the
# iOS-Simulator build leg run on the self-hosted macOS runner; the Linux leg runs
# on the repo-scoped `Linux`/`docker` runner (a Docker-host runner) inside the
# official `swift:6.2` container via the job-level `container:` key, which pins the
# toolchain. The runner must be repo-scoped: Stout is a public repo, and org-level
# runner groups block public repositories by default, so an org runner's jobs sit
# queued forever.
#
# WHY macOS-alone is insufficient (design D6/D7): Stout is a cross-platform
# exporter for opentelemetry-swift that runs on iOS, macOS, watchOS, tvOS and
# Linux. Platform-specific transport (URLSession on Apple vs async-http-client
# on Linux) and Foundation differences are real, so CI MUST cover the
# iOS Simulator AND Linux — not just macOS. The Linux leg is the first real
# compile of `AsyncHTTPClientTransport` and the `CZlib` system-zlib shim.
#
# See docs/speckit/00-foundation-setup.md §4.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & Test (macOS)
    # Pin to macOS: the Linux runner also carries the `self-hosted` label, so a bare
    # `[self-hosted]` can schedule this Mac-only job onto Linux (no Swift toolchain
    # on that host → `swift: command not found`).
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4
      - name: swift build
        run: swift build
      - name: swift test
        run: swift test

  linux:
    name: Build & Test (Linux)
    # Route by the `Linux` label to the repo-scoped Docker-host runner. The runner
    # agent itself runs inside a container, so its `_work`/`externals` dirs are NOT
    # visible to the host Docker daemon. That rules out both the job-level
    # `container:` key (its `/__e` node mount lands empty → JS actions like checkout
    # fail) and a naive `-v $GITHUB_WORKSPACE` mount (resolves to an empty host
    # path). So we let checkout run on the runner (where Node lives) and STREAM the
    # tree into swift:6.2 over stdin via tar — no shared volume, no path alignment.
    runs-on: [Linux]
    steps:
      - uses: actions/checkout@v4
      # swift:6.2+ is required — transitive deps (async-http-client, swift-log)
      # declare swift-tools 6.2, which the 6.0 image can't resolve. The base image
      # already ships zlib1g-dev (the CZlib systemLibrary header, pkgConfig "zlib"),
      # so no apt step is needed.
      #
      # Speed: two named Docker volumes persist SwiftPM's compiled output (`.build`)
      # and its dependency cache across runs — cold first build populates them, then
      # only changed sources recompile (the NIO/async-http-client/OTel graph stays
      # cached), turning ~13 min cold builds into a few minutes incremental. Named
      # volumes live on the host daemon, so they sidestep the nested-docker path
      # problem that rules out bind mounts. They are keyed to the toolchain
      # (`-swift62`) so a future image bump starts clean instead of reusing stale
      # artifacts. `-j $(nproc)` uses all cores now the runner has RAM headroom;
      # if it ever OOMs again, cap it (e.g. `-j 4`).
      - name: swift build + test (swift:6.2)
        run: |
          tar -C "$GITHUB_WORKSPACE" -cf - . \
            | docker run --rm -i -w /src \
                -v stout-build-swift62:/src/.build \
                -v stout-spm-cache-swift62:/root/.cache/org.swift.swiftpm \
                swift:6.2 bash -euxo pipefail -c '
                  mkdir -p /src && tar -C /src -xf -
                  swift build -j "$(nproc)"
                  swift test -j "$(nproc)"
                '

  ios-simulator:
    name: Build (iOS Simulator)
    # Pin to macOS (see build-test) — xcodebuild is Apple-only.
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4
      # Generic destination — builds for the simulator without booting one.
      - name: xcodebuild (iOS Simulator)
        run: >
          xcodebuild build
          -scheme Stout
          -destination 'generic/platform=iOS Simulator'

  lint:
    name: Lint (swift-format)
    # Pin to macOS (see build-test) — swift-format lives on the Mac runner.
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4
      - name: swift format lint
        run: swift format lint --strict --recursive Sources Tests
