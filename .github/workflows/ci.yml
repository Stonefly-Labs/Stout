# Stout CI
#
# INTERIM: all legs run on self-hosted runners while the maintainer operates
# them. The macOS legs (swift build/test + swift-format lint) and the
# iOS-Simulator build leg run on the self-hosted macOS runner; the Linux leg runs
# on the self-hosted `Linux`/`docker` runner. That runner hosts the runner agent
# itself inside a container, so it cannot accept a job that uses the `container:`
# key (GitHub won't nest a job container in a containerized runner — such jobs sit
# queued forever). Instead the Linux leg drives the official `swift:6.2` image
# itself via the runner's Docker daemon, which pins the toolchain the same way.
#
# WHY macOS-alone is insufficient (design D6/D7): Stout is a cross-platform
# exporter for opentelemetry-swift that runs on iOS, macOS, watchOS, tvOS and
# Linux. Platform-specific transport (URLSession on Apple vs async-http-client
# on Linux) and Foundation differences are real, so CI MUST cover the
# iOS Simulator AND Linux — not just macOS. The Linux leg is the first real
# compile of `AsyncHTTPClientTransport` and the `CZlib` system-zlib shim.
#
# See docs/speckit/00-foundation-setup.md §4.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & Test (macOS)
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4
      - name: swift build
        run: swift build
      - name: swift test
        run: swift test

  linux:
    name: Build & Test (Linux)
    # Route to the containerized self-hosted runner by its `Linux` label. We do NOT
    # use the job-level `container:` key here — that runner runs the agent inside a
    # container and GitHub will not dispatch a job-container job to it (it would sit
    # queued forever). We run the toolchain container ourselves via its Docker
    # daemon instead.
    runs-on: [Linux]
    steps:
      - uses: actions/checkout@v4
      # Drive swift:6.2 through the runner's own Docker daemon (docker-outside-of-
      # docker). swift:6.2+ is required — transitive deps (async-http-client,
      # swift-log) declare swift-tools 6.2, which the 6.0 image can't resolve.
      # zlib1g-dev supplies the headers for the CZlib systemLibrary target.
      # $GITHUB_WORKSPACE is bind-mounted at the same path so SwiftPM sees the
      # checkout; the runner's work dir is shared with the host, so the path aligns.
      - name: swift build + test (swift:6.2)
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE":"$GITHUB_WORKSPACE" \
            -w "$GITHUB_WORKSPACE" \
            swift:6.2 \
            bash -euxo pipefail -c '
              apt-get update && apt-get install -y --no-install-recommends zlib1g-dev
              swift build
              swift test
            '

  ios-simulator:
    name: Build (iOS Simulator)
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4
      # Generic destination — builds for the simulator without booting one.
      - name: xcodebuild (iOS Simulator)
        run: >
          xcodebuild build
          -scheme Stout
          -destination 'generic/platform=iOS Simulator'

  lint:
    name: Lint (swift-format)
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4
      - name: swift format lint
        run: swift format lint --strict --recursive Sources Tests
