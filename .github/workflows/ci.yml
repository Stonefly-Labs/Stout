# Stout CI
#
# INTERIM: this workflow runs on a self-hosted runner while the maintainer
# registers one. The macOS legs (swift build/test + swift-format lint) plus an
# iOS-Simulator build leg run there today.
#
# WHY macOS-alone is insufficient (design D6/D7): Stout is a cross-platform
# exporter for opentelemetry-swift that runs on iOS, macOS, watchOS, tvOS and
# Linux. Platform-specific transport (URLSession on Apple vs async-http-client
# on Linux) and Foundation differences are real, so CI MUST cover the
# iOS Simulator AND Linux — not just macOS.
#
# TODO (Linux leg — still outstanding): add a Linux job on the official
# `swift:6.x` Docker images (e.g. Ubuntu Jammy + Noble) once a Linux runner /
# Docker is available, and eventually a GitHub-hosted macOS + Linux matrix.
# See docs/speckit/00-foundation-setup.md §4.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & Test (macOS)
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4
      - name: swift build
        run: swift build
      - name: swift test
        run: swift test

  ios-simulator:
    name: Build (iOS Simulator)
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4
      # Generic destination — builds for the simulator without booting one.
      - name: xcodebuild (iOS Simulator)
        run: >
          xcodebuild build
          -scheme Stout
          -destination 'generic/platform=iOS Simulator'

  lint:
    name: Lint (swift-format)
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4
      - name: swift format lint
        run: swift format lint --strict --recursive Sources Tests
